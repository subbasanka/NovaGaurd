<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acme Corp — Test Page</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #222; }

    /* Violation 5: WCAG 2.4.7 — removes focus indicator */
    a:focus, button:focus, input:focus { outline: none; }
  </style>
</head>
<body>

  <h1>Welcome to Acme Corp</h1>

  <!-- Violation 1: WCAG 1.1.1 — img missing alt attribute -->
  <img src="hero.png" style="width:100%;max-height:200px;background:#ddd;display:block;">

  <p>We build great products for everyone — or so we claim.</p>

  <!-- Violation 2: WCAG 1.4.3 — button with insufficient color contrast (#aaa on #ccc = ~1.6:1) -->
  <button style="color:#aaa;background:#ccc;padding:8px 16px;border:none;font-size:16px;cursor:pointer;">
    Submit
  </button>

  <hr>

  <h2>Contact Us</h2>

  <!-- Violation 3: WCAG 1.3.1 / 4.1.2 — input has no associated <label> -->
  <div>
    <input type="email" placeholder="Email" style="padding:8px;font-size:14px;border:1px solid #ccc;">
  </div>

  <hr>

  <h2>Interactive Demo</h2>

  <!-- Violation 4: WCAG 2.1.1 — div with onclick is not keyboard focusable or operable -->
  <div
    onclick="alert('You clicked the div!')"
    style="display:inline-block;padding:10px 20px;background:#4a90e2;color:#fff;border-radius:4px;cursor:pointer;"
  >
    Click me
  </div>

  <p style="margin-top:40px;color:#888;font-size:12px;">
    This page intentionally contains WCAG 2.2 violations for accessibility testing purposes.
  </p>

</body>
</html>
